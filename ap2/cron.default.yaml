jobs:
  - name: status-report
    interval: 8h
    prompt: |
      (TB-144: this prompt body is a stub — the daemon dispatches
      status-report jobs through `ap2.status_report.run_status_report`,
      which builds the prompt from the canonical
      `ap2.status_report.STATUS_REPORT_PROMPT` constant. Edit that
      constant if you want to change the report's shape; editing this
      stub has no effect at runtime. Kept here for legibility — `ap2
      cron list` still shows that a status-report job exists, with the
      operator-tunable `interval` / `max_turns` fields above.
      TB-228: the routine also injects an `## Automation loop activity`
      section into the snapshot block when the auto-approve /
      auto-unfreeze loop has been active since the last report; the
      canonical prompt teaches the agent to forward that section
      verbatim into the Mattermost post.
      TB-244: the routine likewise injects a `## Focus rotation activity`
      sub-block when axis-4 `roadmap_complete` events landed in the
      inter-report window; the canonical prompt also teaches verbatim-
      forwarding for that sub-block so a roadmap-complete halt at 03:00Z
      surfaces in the very next 8h cron post instead of waiting on a
      manual `ap2 status`. (Pre-TB-342 the digest also rendered the
      now-deleted `focus_advanced` rotation event.)
      TB-245: the routine likewise injects a
      `*Validator-judge fail-open window (24h):*` sub-block when
      axis-1 `validator_judge_fail` / `validator_judge_timeout` events
      landed in the last 24h (with a `[noisy]` suffix when the count
      crosses `AP2_VALIDATOR_JUDGE_NOISY_THRESHOLD`); the canonical
      prompt teaches verbatim-forwarding for that sub-block so silent
      degradation of the TB-235 dep-coherence judge surfaces in the
      very next 8h cron post instead of waiting on a manual
      `ap2 status`.)
    max_turns: 10
    created_by: bootstrap
  - name: real-sdk-smoke
    interval: 6h
    prompt: |
      (TB-350: this prompt body is a stub — the daemon dispatches
      real-sdk-smoke jobs through `ap2.smoke_runner.run_smoke_check`,
      which runs `uv run --extra dev pytest -q ap2/tests/smoke/` as a
      timeout-bounded subprocess and posts a Mattermost alert on failure
      only. Editing this stub has no effect at runtime — the work is a
      deterministic shell action (running pytest), not an LLM task, and
      control / cron agents have no Bash anyway. Kept here for legibility
      so `ap2 cron list` shows that a real-sdk-smoke job exists, with the
      operator-tunable `interval` field above.
      The smoke suite makes LIVE Claude API calls, so the routine is
      inert-by-default: it emits a single `smoke_check_skipped` event and
      returns immediately unless `AP2_REAL_SDK` is set to a non-falsey
      value. This keeps the shipped job a no-op on installs that haven't
      opted into the paid smokes. On an opted-in install the routine emits
      `smoke_check_passed` (with duration) or `smoke_check_failed` (with
      exit code + the captured failure tail), restoring the live-API
      canary that the per-task verification gate dropped on 2026-05-30 to
      stop transient-blip false-fails. The run is bounded by
      `AP2_VERIFY_TIMEOUT_S` so a hung live SDK can't stall the tick.)
    max_turns: 1
    created_by: bootstrap

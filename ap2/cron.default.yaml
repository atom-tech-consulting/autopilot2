jobs:
  - name: status-report
    interval: 2h
    prompt: |
      (TB-144: this prompt body is a stub — the daemon dispatches
      status-report jobs through `ap2.status_report.run_status_report`,
      which builds the prompt from the canonical
      `ap2.status_report.STATUS_REPORT_PROMPT` constant. Edit that
      constant if you want to change the report's shape; editing this
      stub has no effect at runtime. Kept here for legibility — `ap2
      cron list` still shows that a status-report job exists, with the
      operator-tunable `interval` / `max_turns` fields above.
      TB-228: the routine also injects an `## Automation loop activity`
      section into the snapshot block when the auto-approve /
      auto-unfreeze loop has been active since the last report; the
      canonical prompt teaches the agent to forward that section
      verbatim into the Mattermost post.
      TB-244: the routine likewise injects a `## Focus rotation activity`
      sub-block when axis-4 `focus_advanced` / `roadmap_complete` events
      landed in the inter-report window; the canonical prompt also
      teaches verbatim-forwarding for that sub-block so a
      roadmap-complete halt at 03:00Z surfaces in the very next 2h cron
      post instead of waiting on a manual `ap2 status`.
      TB-245: the routine likewise injects a
      `*Validator-judge fail-open window (24h):*` sub-block when
      axis-1 `validator_judge_fail` / `validator_judge_timeout` events
      landed in the last 24h (with a `[noisy]` suffix when the count
      crosses `AP2_VALIDATOR_JUDGE_NOISY_THRESHOLD`); the canonical
      prompt teaches verbatim-forwarding for that sub-block so silent
      degradation of the TB-235 dep-coherence judge surfaces in the
      very next 2h cron post instead of waiting on a manual
      `ap2 status`.)
    max_turns: 10
    created_by: bootstrap

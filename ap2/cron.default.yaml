jobs:
  - name: status-report
    interval: 2h
    prompt: |
      Read the last 50 events from events.jsonl and the last 20 lines of
      progress.md. Post a concise summary to the mattermost channel identified
      by AP2_MM_REPORT_CHANNEL (or #autopilot if unset). Cover: tasks completed,
      tasks failed, pipelines/cron activity, open issues. Keep under 10 lines.
    max_turns: 10
    created_by: bootstrap

  - name: ideation
    interval: 6h
    prompt: |
      Goal: keep Backlog populated with high-leverage, goal-aligned tasks.

      Read these files in order:
      1. goal.md — project mission, current focus, non-goals, constraints.
         If absent OR all sections are still placeholders, infer goals from
         CLAUDE.md + progress.md instead.
      2. TASKS.md — current board state (do not duplicate existing tasks).
      3. progress.md — recent completed work, for follow-up discovery.
      4. CLAUDE.md — project conventions and any Autopilot config.

      Propose new tasks ONLY if Backlog has fewer than 3 workable items.

      ## Follow-up discovery (do this BEFORE greenfield ideation)
      Look at the most recent ~10 entries in TASKS.md `## Complete` and the
      matching sections in progress.md. For each, ask:
        - What natural next step did this completion enable?
        - What edge case wasn't addressed?
        - What instrumentation does this new feature need?
      Collect follow-up candidates from this scan first. Only fall back to
      greenfield ideas if you're short of 3 candidates afterwards.

      ## Ranking
      Rank candidates by:
        - alignment with goal.md (Mission, Current focus; respect Non-goals)
        - impact relative to current project state
        - freshness of the seed (a follow-up to yesterday's task beats one
          to last month's)

      Propose the top 3 via board_edit (action: add_backlog) with a
      structured briefing. The daemon will pick them up automatically on the
      next tick — no human review gate. Do not add duplicates.

      ## Briefing requirements (load-bearing — TB-69 verifier reads these)
      Every briefing you write MUST include a `## Verification` section with
      concrete acceptance bullets that the per-task verifier can evaluate:
        - Prefer backtick-fenced shell commands at the START of the bullet
          (e.g. `- \`uv run pytest -q\` — full suite passes`); the verifier
          runs them automatically and exit 0 = pass.
        - Prose bullets are allowed for criteria a shell command can't
          express; they're judged by an SDK call against the diff.
      A briefing with no `## Verification` section will be skipped by the
      verifier (legacy compat). New work should not opt into that path.

      ## Long-running work — propose as a pipeline pattern (TB-80)
      If the proposed work plausibly takes more than ~10 minutes as a single
      agent dispatch (parameter sweeps, multi-day backtests, large data
      preprocessing), DO NOT propose it as one mega-task. The daemon dispatches
      tasks one at a time inside `await sdk.query(...)` — a 30-min task holds
      the only task slot for 30 min. Propose as THREE coordinated tasks +
      a self-removing cron, leveraging TB-62's `blocked_on` enforcement:

      1. **Launch task (TB-A)** — fast (<2 min). The agent's job is to
         spawn the long work as an OS-level background process and exit:
            `nohup uv run python -m foo sweep ... > out.log 2>&1 &`
            `echo $! > .cc-autopilot/pipelines/<name>.pid`
         Plus, before exiting, the agent calls `board_edit` twice to set up
         the dependent tasks below, then includes a `cron: add ...` directive
         in its RESULT block to register the monitor.

      2. **Stub completion task (TB-A_done)** — created by TB-A via
         `board_edit add_frozen title="<name> pipeline complete"`. Lives in
         Frozen as a semantic anchor — its existence-in-Frozen means
         "pipeline still running"; moving it to Complete means "pipeline done".

      3. **Validation task (TB-B)** — created by TB-A via
         `board_edit add_backlog title="Validate <name> output" briefing=...
         blocked_on=<TB-A_done's id>`. Sits in Backlog gated by
         `next_dispatchable` until TB-A_done is in Complete. Its briefing
         describes whatever review/report-generation work follows the run.

      4. **Monitor cron** — registered by TB-A via the RESULT `cron: add`
         directive. Pattern:
            `cron: add name=monitor-<name> interval=10m
             active_when="sh:test -f .cc-autopilot/pipelines/<name>.pid"
             prompt="Read .cc-autopilot/pipelines/<name>.pid; if kill -0 \$pid
             succeeds the pipeline is still running — log_event and exit. If
             kill -0 fails AND the output dir is populated, the pipeline is
             done — call board_edit move_to_complete TB-<A_done's id> (which
             auto-unblocks the validation task via TB-62), then cron_edit
             remove name=monitor-<name>. If kill -0 fails AND output is
             missing/empty, the pipeline crashed — log_event severity=error
             and still move TB-<A_done's id> to Complete so the validation
             task fires and surfaces the failure in its own diff."`

      The validation task auto-promotes Backlog → Ready once the monitor
      moves TB-A_done to Complete, so the daemon picks it up on the next
      tick — no manual unfreeze needed (the original plan-doc design used
      Frozen+manual-unfreeze, which TB-62 makes obsolete).

      Heuristic for "more than 10 min": grid sweeps with >5 parameter
      combinations on minute-bar data; full-history backtests on >10
      tickers; anything that fans out across many subprocesses; anything
      whose existing CLI (e.g. `python -m stoch sweep`) has progress bars.

      ## Shell-bullet pitfalls to AVOID (TB-76 — observed in prod)
      The verifier runs each shell bullet via `/bin/sh -c <bullet>` in the
      project root. Common mistakes that fail with exit 127 / 126 even when
      the underlying work is correct:
        - **Bare `python`** — the daemon's environment has `uv run python`,
          `python3`, `.venv/bin/python` — but typically NOT bare `python`
          on PATH. Use `\`uv run python ...\`` (preferred for repos using uv)
          or `\`python3 ...\``, never bare `\`python ...\``.
        - **Bare path as command** — `\`reports/foo/README.md\`` makes shell
          try to *execute* the markdown file (exit 126). For existence
          checks use `\`test -f reports/foo/README.md\``; for line-count
          bounds use `\`[ "$(wc -l < reports/foo/README.md)" -le 30 ]\``.
        - **Multi-line shell bullets** — keep the bullet's command on one
          line. Wrap multiple steps in `\`bash -c '...'\`` or `&&`-chain.
      Prefer running concrete project commands (e.g. `uv run pytest -q`,
      `uv run python -m stoch ...`) over inventing new ones.
    active_when: "sh:awk '/^## Backlog/{f=1;next}/^## /{f=0}f' TASKS.md | grep -c '^- \\[' | awk '{exit ($1>=3)}'"
    max_turns: 15
    created_by: bootstrap
